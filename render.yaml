# Render Blueprint — Helix API + static client
# https://render.com/docs/blueprint-spec
#
# After first deploy, set secret env vars in the Render dashboard, then
# set helix-api CLIENT_ORIGIN to the helix-web URL and helix-web
# VITE_API_URL to https://<helix-api-host>/api, then redeploy the static site.

services:
  - type: web
    name: helix-api
    runtime: node
    plan: free
    region: oregon
    rootDir: helix/server
    buildCommand: npm install
    startCommand: npx prisma generate && npx prisma db push && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: CLIENT_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  - type: web
    name: helix-web
    runtime: static
    plan: free
    rootDir: helix/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
